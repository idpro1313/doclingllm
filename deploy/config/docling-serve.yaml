# docling-serve admin configuration — remote inference via model-gateway
# Mount path in container: /config/docling-serve.yaml
#
# Важно (docling-jobkit): preset ID в default_*_preset при lookup "default" часто
# трактуется как kind docling, не как custom preset. Custom presets с ключом
# "default" (и для OCR — "auto") перезаписывают registry после init.
#
# VLM/API: url/params ТОЛЬКО в engine_options (ApiVlmEngine), не в api_overrides.

enable_remote_services: true
load_models_at_boot: false
log_format: json

# OCR → UI/API шлют ocr_preset=auto; перезаписываем registry["auto"]
default_ocr_kind: kserve_v2_ocr
default_ocr_preset: remote_ocr
custom_ocr_presets:
  auto:
    kind: kserve_v2_ocr
    url: "http://model-gateway:8080"
    transport: http
    model_name: ocr
  remote_ocr:
    kind: kserve_v2_ocr
    url: "http://model-gateway:8080"
    transport: http
    model_name: ocr

# Layout → _parse_layout_options("default"); перезаписываем registry["default"]
default_layout_kind: layout_object_detection
default_layout_preset: remote_layout
custom_layout_presets:
  default:
    kind: layout_object_detection
    engine_options:
      engine_type: api_kserve_v2
      url: "http://model-gateway:8080"
      transport: http
      model_name: layout
  remote_layout:
    kind: layout_object_detection
    engine_options:
      engine_type: api_kserve_v2
      url: "http://model-gateway:8080"
      transport: http
      model_name: layout

# Table: remote KServe kind в docling WIP → bundled TableFormer в образе
default_table_structure_preset: tableformer_v1_accurate

# Picture classification → registry["default"] перезаписываем custom preset
default_picture_classification_preset: remote_pic_class
custom_picture_classification_presets:
  default:
    engine_options:
      engine_type: api_kserve_v2
      url: "http://model-gateway:8080"
      transport: http
      model_name: picture_classifier
    model_spec:
      name: document_figure_classifier_v2_5
      repo_id: docling-project/DocumentFigureClassifier-v2.5
  remote_pic_class:
    engine_options:
      engine_type: api_kserve_v2
      url: "http://model-gateway:8080"
      transport: http
      model_name: picture_classifier
    model_spec:
      name: document_figure_classifier_v2_5
      repo_id: docling-project/DocumentFigureClassifier-v2.5

# VLM pipeline → OpenAI-compatible proxy on gateway
default_vlm_preset: remote_vlm
custom_vlm_presets:
  remote_vlm:
    engine_options:
      engine_type: api
      url: "http://model-gateway:8080/v1/chat/completions"
      params:
        model: deepseek-ai/DeepSeek-OCR-2
      timeout: 120.0
      concurrency: 1
    model_spec:
      name: DeepSeek-OCR-2-Remote
      default_repo_id: deepseek-ai/DeepSeek-OCR-2
      prompt: "Convert this page to docling."
      response_format: markdown

# Picture description
default_picture_description_preset: remote_pic_desc
custom_picture_description_presets:
  remote_pic_desc:
    engine_options:
      engine_type: api
      url: "http://model-gateway:8080/v1/chat/completions"
      params:
        model: deepseek-ai/DeepSeek-OCR-2
      timeout: 120.0
      concurrency: 1
    model_spec:
      name: DeepSeek-OCR-2-PictureDesc
      default_repo_id: deepseek-ai/DeepSeek-OCR-2
      prompt: "Describe this picture from a document. Be concise and accurate."
      response_format: plain
    prompt: "Describe this picture from a document. Be concise and accurate."

# Code/formula → text backend via gateway OpenAI proxy
default_code_formula_preset: remote_code_formula
custom_code_formula_presets:
  remote_code_formula:
    engine_options:
      engine_type: api
      url: "http://model-gateway:8080/v1/chat/completions"
      params:
        model: minimax-m2.7
      timeout: 120.0
      concurrency: 1
    model_spec:
      name: Minimax-CodeFormula
      default_repo_id: minimax-m2.7
      prompt: "Transcribe the code or mathematical formula accurately."
      response_format: plain

allowed_vlm_presets:
  - remote_vlm
allowed_picture_description_presets:
  - remote_pic_desc
allowed_code_formula_presets:
  - remote_code_formula
