services:
  model-gateway:
    build:
      context: ..
      dockerfile: deploy/gateway/Dockerfile
    container_name: doclingllm-gateway
    env_file:
      - .env
    environment:
      # Optional corporate proxy for vision HTTPS (set in deploy/.env)
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,model-gateway,docling-serve}
    volumes:
      - ./config/gateway-models.yaml:/config/gateway-models.yaml:ro
    networks:
      - doclingllm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  docling-serve:
    image: quay.io/docling-project/docling-serve-cpu:latest
    container_name: doclingllm-docling-serve
    depends_on:
      model-gateway:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DOCLING_SERVE_CONFIG_FILE: /config/docling-serve.yaml
      DOCLING_SERVE_ENABLE_REMOTE_SERVICES: "true"
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "false"
      DOCLING_SERVE_LOG_FORMAT: json
      DOCLING_DEVICE: cpu
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 5001
    volumes:
      - ./config/docling-serve.yaml:/config/docling-serve.yaml:ro
    ports:
      - "5001:5001"
    networks:
      - doclingllm-net
    restart: unless-stopped

networks:
  doclingllm-net:
    driver: bridge
