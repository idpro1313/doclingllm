services:
  model-gateway:
    build:
      context: ..
      dockerfile: deploy/gateway/Dockerfile
    container_name: doclingllm-gateway
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DOCLINGLLM_CONFIG_DIR: /data/doclingllm/config
      GATEWAY_RUNTIME_CONFIG: /data/doclingllm/config/gateway-runtime.yaml
      GATEWAY_MODELS_TEMPLATE: /config/templates/gateway-models.template.yaml
      GATEWAY_RUNTIME_DEFAULTS: /config/templates/gateway-runtime.defaults.yaml
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,model-gateway,docling-serve}
    volumes:
      - doclingllm-config:/data/doclingllm/config
      - ./config/gateway-models.template.yaml:/config/templates/gateway-models.template.yaml:ro
      - ./config/gateway-runtime.defaults.yaml:/config/templates/gateway-runtime.defaults.yaml:ro
    networks:
      - doclingllm-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  docling-serve:
    build:
      context: ./docling-serve
      dockerfile: Dockerfile
    image: doclingllm-docling-serve:local
    container_name: doclingllm-docling-serve
    depends_on:
      model-gateway:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DOCLING_SERVE_CONFIG_FILE: /data/doclingllm/config/docling-serve.yaml
      DOCLING_SERVE_ENABLE_REMOTE_SERVICES: "true"
      DOCLING_SERVE_ENABLE_UI: "true"
      DOCLING_SERVE_LOAD_MODELS_AT_BOOT: "false"
      DOCLING_SERVE_LOG_FORMAT: json
      DOCLING_SERVE_MAX_SYNC_WAIT: "600"
      DOCLING_DEVICE: cpu
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: 5001
    volumes:
      - doclingllm-config:/data/doclingllm/config:ro
    ports:
      - "5001:5001"
    networks:
      - doclingllm-net
    restart: unless-stopped

networks:
  doclingllm-net:
    driver: bridge

volumes:
  doclingllm-config:
    name: doclingllm-config
